---
# API Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bills-api
  namespace: bills-app
  labels:
    app: bills-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bills-api
  template:
    metadata:
      labels:
        app: bills-api
    spec:
      containers:
        - name: api
          image: jaimehenao8126/bills-api:3c87aa9f59a6bc9e53df34f94112a15e1e7045f5
          imagePullPolicy: IfNotPresent
          # Find prisma CLI in pnpm store and run migrations, then start the server
          command:
            - /bin/sh
            - -c
            - >-
              /app/node_modules/.bin/prisma migrate deploy --schema /app/apps/api/prisma/schema.prisma 2>/dev/null || true &&
              node dist/main
          ports:
            - containerPort: 3002
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: bills-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: bills-secrets
                  key: REDIS_URL
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: bills-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bills-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: bills-config
                  key: POSTGRES_DB
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bills-secrets
                  key: REDIS_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: bills-secrets
                  key: JWT_SECRET
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: bills-config
                  key: PORT
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: bills-config
                  key: NODE_ENV
            - name: WEB_URL
              valueFrom:
                configMapKeyRef:
                  name: bills-config
                  key: WEB_URL
          readinessProbe:
            tcpSocket:
              port: 3002
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 3002
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

---
# API Service (ClusterIP + NodePort for local kind access)
apiVersion: v1
kind: Service
metadata:
  name: bills-api-svc
  namespace: bills-app
spec:
  selector:
    app: bills-api
  type: NodePort
  ports:
    - port: 3002
      targetPort: 3002
      nodePort: 30002
