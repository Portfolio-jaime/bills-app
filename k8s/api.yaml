---
# API Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bills-api
  namespace: bills
  labels:
    app: bills-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bills-api
  template:
    metadata:
      labels:
        app: bills-api
    spec:
      initContainers:
        # Run Prisma migrations before the API starts
        - name: prisma-migrate
          image: bills-api:latest
          imagePullPolicy: IfNotPresent
          workingDir: /app/apps/api
          command:
            - npx
            - prisma
            - migrate
            - deploy
            - --schema=prisma/schema.prisma
          env:
            - name: DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@bills-postgres-svc:5432/$(POSTGRES_DB)"
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: bills-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bills-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: bills-config
                  key: POSTGRES_DB

      containers:
        - name: api
          image: bills-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3002
          env:
            - name: DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@bills-postgres-svc:5432/$(POSTGRES_DB)"
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@bills-redis-svc:6379"
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: bills-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bills-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: bills-config
                  key: POSTGRES_DB
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bills-secrets
                  key: REDIS_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: bills-secrets
                  key: JWT_SECRET
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: bills-config
                  key: PORT
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: bills-config
                  key: NODE_ENV
            - name: WEB_URL
              valueFrom:
                configMapKeyRef:
                  name: bills-config
                  key: WEB_URL
          readinessProbe:
            httpGet:
              path: /api/v1/auth/login
              port: 3002
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/v1/auth/login
              port: 3002
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

---
# API Service (ClusterIP + NodePort for local kind access)
apiVersion: v1
kind: Service
metadata:
  name: bills-api-svc
  namespace: bills
spec:
  selector:
    app: bills-api
  type: NodePort
  ports:
    - port: 3002
      targetPort: 3002
      nodePort: 30002
