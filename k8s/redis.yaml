---
# Redis Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bills-redis
  namespace: bills-app
  labels:
    app: bills-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bills-redis
  template:
    metadata:
      labels:
        app: bills-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - redis-server
            - --requirepass
            - $(REDIS_PASSWORD)
            - --maxmemory
            - 256mb
            - --maxmemory-policy
            - allkeys-lru
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bills-secrets
                  key: REDIS_PASSWORD
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "-a", "$(REDIS_PASSWORD)", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"

---
# Redis Service (ClusterIP — internal only)
apiVersion: v1
kind: Service
metadata:
  name: bills-redis-svc
  namespace: bills-app
spec:
  selector:
    app: bills-redis
  ports:
    - port: 6379
      targetPort: 6379
